name: Feature request
description: Propose a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / opportunity
      description: What job-to-be-done is currently unmet?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should change? Include sketches or references if helpful.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Homepage
        - Products / catalogue
        - Search
        - Compare
        - RFQ flow
        - Industries
        - OEM Supply
        - Navigation / chrome
        - Performance
        - Developer experience
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

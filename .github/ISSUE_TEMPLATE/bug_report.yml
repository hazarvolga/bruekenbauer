name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Actual vs expected behaviour.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to /products
        2. Click on …
        3. See error
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL
      placeholder: https://brueckenbauer.com/products

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (site down / data loss)
        - High (major feature broken)
        - Medium (workaround exists)
        - Low (cosmetic)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Browser, OS, screenshots, console errors.
